# OpenSSF Scorecard
# https://github.com/ossf/scorecard
#
# Публичный score security-практик репозитория. Phase 3 — для open-source.
# Для приватных репо — выключи или используй с api-key.

name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: '0 6 * * 1'  # понедельник 06:00 UTC
  push:
    branches: [main, master]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      security-events: write   # для SARIF в Security tab
      id-token: write          # для publish_results
      contents: read
      actions: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@05b42c624433fc40578a4040d5cf5e36ddca8cde # v2.4.2
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results=true делает скор виден на scorecard.dev — для public repo это плюс
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          sarif_file: results.sarif
