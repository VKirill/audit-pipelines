# Pinact - проверяет что все GitHub Actions запиннены к full SHA
# https://github.com/suzuki-shunsuke/pinact
#
# Phase 2 проверка. Включи когда все existing actions уже мигрированы на SHA.

name: Pinact

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'

permissions:
  contents: read

jobs:
  pinact:
    name: Verify Action pinning
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Run pinact
        # skip_push: только проверка, не делаем PR с фиксами
        # min_age: 7 дней — защита от cooldown-style атак
        uses: suzuki-shunsuke/pinact-action@28aeb220eb3252ad0d4422dd5d9368e925acbd8d # v1.3.0
        with:
          skip_push: "true"
          # min_age в днях — пиннинг не пройдёт, если action моложе этого срока
          # Защита от того, что compromised release попадает в SHA-pin до публичного раскрытия
          min_age: "7"
