name: Feature request
description: Предложить новую функциональность
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Какую проблему решаем?
      description: Что не работает или работает неудобно сейчас?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Предлагаемое решение
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Альтернативы, которые рассмотрел
      description: Если есть

  - type: textarea
    id: context
    attributes:
      label: Дополнительный контекст
      description: Скриншоты, ссылки, примеры из других проектов
